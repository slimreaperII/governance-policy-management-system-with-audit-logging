spring.application.name=api-gateway
server.port=8887

eureka.client.service-url.defaultZone=http://localhost:8888/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=governance-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://GOVERNANCE-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/policies/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[2].id=user-service-auth
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[3].id=governance-swagger
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://GOVERNANCE-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/v3/api-docs/governance
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=RewritePath=/v3/api-docs/governance,/v3/api-docs

springdoc.swagger-ui.urls[0].name=governance-service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/governance

spring.cloud.gateway.server.webmvc.routes[4].id=user-swagger
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/v3/api-docs/user
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=RewritePath=/v3/api-docs/user,/v3/api-docs

springdoc.swagger-ui.urls[1].name=user-service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/user

