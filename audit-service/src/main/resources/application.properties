spring.application.name=audit-service
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5433/audit_service_db
spring.datasource.username=postgres
spring.datasource.password=pass12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=audit_service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.ms_service.auditservice.dto.AuditLogEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false