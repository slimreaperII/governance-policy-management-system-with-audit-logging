spring.application.name=governance-service
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5433/governance_service_db
spring.datasource.username=postgres
spring.datasource.password=pass12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=audit_result_service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.ms_service.governanceservice.dto.AuditResult
spring.kafka.consumer.properties.spring.json.use.type.headers=false

eureka.client.service-url.defaultZone=http://localhost:8888/eureka/

resilience4j.circuitbreaker.instances.governance-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.governance-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.governance-service.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.governance-service.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.governance-service.slow-call-duration-threshold=3s
resilience4j.circuitbreaker.instances.governance-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.governance-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.governance-service.sliding-window-type=TIME_BASED
resilience4j.circuitbreaker.instances.governance-service.sliding-window-size=5